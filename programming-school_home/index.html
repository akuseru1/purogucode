<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>プログラミングスクール</title>
    <link rel="stylesheet" href="CSS/style.css">
</head>
<body>
    <div class="page">
        <main class="main-container">
            <div class="top-header">
                <button class="sidebar-toggle top-toggle" id="sidebar-toggle" type="button" aria-expanded="false" aria-controls="side-menu">☰</button>
                <section id="title" class="title"><H1><p style="color: yellowgreen; text-align: center;">プログコード</p></H1></section>
            </div>
            <div class="bottom-row">
                <section id="seiseki" class="seiseki">
                    <aside class="side-menu" id="side-menu">
                        <button class="sidebar-toggle sidebar-close" id="sidebar-close" type="button" aria-label="サイドバーを閉じる">×</button>
                        <div class="sidebar-auto-links">
                            <a href="study.html">勉強ページ</a>
                            <a href="#">ホーム</a>
                            <a href="#">ランキング</a>
                        </div>
                    </aside>
                    <div class="status-panel">
                        <div class="status-left">
                            <div class="title-row">
                                <div class="title-box">
                                    <p class="small-title">称号:</p>
                                    <p class="main-title">八幡平No.1</p>
                                    <select class="title-select" name="title-select">
                                        <option value="hatimantai-no1">ハッカー</option>
                                        <option value="rookie">プログラマー</option>
                                        <option value="silver">パソコン使い</option>
                                    </select>
                                </div>
                            </div>
                            <div class="score-box">
                                <p>・先月の成績</p>
                                <p>・Sランクまであと○点</p>
                                <p>・現在の総合点数○点</p>
                            </div>
                        </div>
                        <div class="rank-box">
                            <p>ランク</p>
                            <p class="rank-letter">A</p>
                        </div>
                    </div>
                </section>
                <section id="chat" class="chat">
                    <img class="chat-photo" src="../S__9224217.jpg" alt="プロフィール画像">
                </section>
            </div>
        </main>
    </div>

    <script src="Javascript/script.js"></script>
</body>
</html>
